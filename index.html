<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Website</title>
    <link rel="stylesheet" href="style.css">
</head>
<style>
    body{
    margin:0;
    font-family: Arial, sans-serif;
    background:#f4f4f4;
}

header{
    background:#333;
    color:white;
    text-align:center;
    padding:20px;
}

nav{
    background:#555;
    text-align:center;
    padding:10px;
}

nav a{
    color:white;
    text-decoration:none;
    margin:0 15px;
    font-weight:bold;
}

nav a:hover{
    color:#00bfff;
}

.content{
    text-align:center;
    padding:40px;
}

button{
    padding:12px 25px;
    border:none;
    background:#007BFF;
    color:white;
    font-size:16px;
    border-radius:5px;
    cursor:pointer;
}

button:hover{
    background:#0056b3;
}

footer{
    background:#333;
    color:white;
    text-align:center;
    padding:15px;
    margin-top:40px;
}
</style>
<body>

<header>
    <h1>My Website</h1>
    <p>Simple page using External CSS</p>
</header>

<nav>
    <a href="#">Home</a>
    <a href="#">About</a>
    <a href="#">Services</a>
    <a href="#">Contact</a>
</nav>

<section class="content">
    <h2>Welcome</h2>
    <p>This page is styled using an external CSS file.</p>

    <button>Click Me</button>
</section>

<footer>
    <p>© 2026 My Website</p>
</footer>

</body>
</html>
