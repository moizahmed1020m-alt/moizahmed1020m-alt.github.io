<!DOCTYPE html>
<html>
<head>
    <title>My Simple Web Page</title>
</head>
<body style="margin:0; font-family:Arial, sans-serif; background-color:#f4f4f4;">

    <header style="background-color:#333; color:white; padding:20px; text-align:center;">
        <h1 style="margin:0;">Welcome to My Website</h1>
        <p style="margin:5px 0;">A simple HTML page with inline CSS</p>
    </header>

    <nav style="background:#555; padding:10px; text-align:center;">
        <a href="#" style="color:white; margin:0 15px; text-decoration:none; font-weight:bold;">Home</a>
        <a href="#" style="color:white; margin:0 15px; text-decoration:none; font-weight:bold;">About</a>
        <a href="#" style="color:white; margin:0 15px; text-decoration:none; font-weight:bold;">Services</a>
        <a href="#" style="color:white; margin:0 15px; text-decoration:none; font-weight:bold;">Contact</a>
    </nav>

    <main style="padding:40px; text-align:center;">
        <h2 style="color:#333;">Hello 👋</h2>
        <p style="color:#666; max-width:600px; margin:auto;">
            This is a basic HTML page styled using inline CSS. Inline CSS means the styles are written
            directly inside the HTML tags using the <code>style</code> attribute.
        </p>

        <button style="
            margin-top:20px;
            padding:12px 25px;
            border:none;
            background:#007BFF;
            color:white;
            font-size:16px;
            border-radius:5px;
            cursor:pointer;
        ">
            Click Me
        </button>
    </main>

    <footer style="background:#333; color:white; text-align:center; padding:15px; margin-top:40px;">
        <p style="margin:0;">© 2026 My Website</p>
    </footer>

</body>
</html>
